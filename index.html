<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profil Digital Modern</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e293b);
color:#fff;
}

/* NAV */
nav{
display:flex;
justify-content:space-between;
padding:15px 8%;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
position:sticky;
top:0;
}

nav a{
color:#fff;
text-decoration:none;
margin:0 10px;
font-weight:500;
}

nav a:hover{
color:#38bdf8;
}

/* SECTION */
section{
padding:60px 10%;
}

.card{
background:rgba(255,255,255,0.08);
padding:25px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* BIO */
.bio{
display:flex;
flex-wrap:wrap;
gap:20px;
align-items:center;
}

/* FOTO CUSTOM */
.bio-photo{
width:220px;
height:220px;
border-radius:50%;
border:2px dashed #38bdf8;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
overflow:hidden;
background:rgba(255,255,255,0.05);
}

.bio-photo img{
width:100%;
height:100%;
object-fit:cover;
}

#placeholder{
color:#38bdf8;
font-size:14px;
text-align:center;
}

/* TABLE */
table{
width:100%;
margin-top:10px;
}

td{
padding:8px;
border-bottom:1px solid rgba(255,255,255,0.1);
}

/* EDIT */
.editable:hover{
outline:2px dashed #38bdf8;
cursor:pointer;
}

/* GALERI */
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:10px;
margin-top:15px;
}

.gallery img{
width:100%;
border-radius:10px;
cursor:pointer;
}

/* LIGHTBOX */
.lightbox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
}

.lightbox img{
max-width:90%;
border-radius:10px;
}

/* BUTTON */
button{
background:#38bdf8;
border:none;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
color:#000;
font-weight:bold;
}

</style>
</head>

<body>

<nav>
<h3>🌐 Profil Digital</h3>
<div>
<a href="#bio">Profil</a>
<a href="#tentang">Tentang</a>
<a href="#galeri">Galeri</a>
<a href="#" onclick="adminMode()">Admin</a>
</div>
</nav>

<!-- BIO -->
<section id="bio">
<div class="card bio">

<div class="bio-photo" onclick="uploadFoto.click()">
<img id="foto" style="display:none;">
<div id="placeholder">+ Tambah Foto</div>
<input type="file" id="uploadFoto" hidden>
</div>

<div style="flex:1">
<h2 class="editable" id="nama">Nama Kamu</h2>

<table>
<tr><td>Nama</td><td class="editable" id="namaData">Nama Kamu</td></tr>
<tr><td>TTL</td><td class="editable" id="ttl">-</td></tr>
<tr><td>Alamat</td><td class="editable" id="alamat">-</td></tr>
<tr><td>Hobi</td><td class="editable" id="hobi">-</td></tr>
</table>

</div>

</div>
</section>

<!-- TENTANG -->
<section id="tentang">
<div class="card">
<h2>✨ Tentang Saya</h2>
<p class="editable" id="tentangText">
Tulis tentang dirimu di sini...
</p>
</div>
</section>

<!-- GALERI -->
<section id="galeri">
<div class="card">
<h2>📸 Galeri</h2>

<div class="gallery" id="gallery"></div>

<input type="file" id="multiFoto" multiple>
</div>
</section>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
<img id="lightboxImg">
</div>

<!-- MUSIC -->
<audio id="music" loop>
<source src="music.mp3">
</audio>

<button onclick="toggleMusic()" style="position:fixed;bottom:20px;right:20px;">
🎵
</button>

<script>

let admin=false;

function adminMode(){
let pass=prompt("Password:");
if(pass!=="admin123456") return alert("Salah!");

admin=true;

document.querySelectorAll(".editable").forEach(el=>{
el.contentEditable=true;
});
}

/* FOTO */
uploadFoto.onchange=function(){
let reader=new FileReader();
reader.onload=e=>{
foto.src=e.target.result;
foto.style.display="block";
placeholder.style.display="none";
localStorage.setItem("foto",e.target.result);
};
reader.readAsDataURL(this.files[0]);
};

/* GALERI */
multiFoto.onchange=function(){
[...this.files].forEach(file=>{
let reader=new FileReader();
reader.onload=e=>{

let img=document.createElement("img");
img.src=e.target.result;

img.onclick=()=>{
lightbox.style.display="flex";
lightboxImg.src=img.src;
};

gallery.appendChild(img);
localStorage.setItem("galeri",gallery.innerHTML);

};
reader.readAsDataURL(file);
});
};

/* LIGHTBOX */
lightbox.onclick=()=>lightbox.style.display="none";

/* LOAD */
window.onload=()=>{

let savedFoto = localStorage.getItem("foto");

if(savedFoto){
foto.src = savedFoto;
foto.style.display = "block";
placeholder.style.display = "none";
}

gallery.innerHTML = localStorage.getItem("galeri") || "";

document.querySelectorAll(".editable").forEach(el=>{
if(localStorage.getItem(el.id)){
el.innerText=localStorage.getItem(el.id);
}
});

};

/* SIMPAN */
document.querySelectorAll(".editable").forEach(el=>{
el.oninput=()=>{
localStorage.setItem(el.id,el.innerText);
};
});

/* MUSIC */
function toggleMusic(){
let m=document.getElementById("music");
m.paused?m.play():m.pause();
}

document.body.addEventListener("click",()=>music.play(),{once:true});

</script>

</body>
</html>
